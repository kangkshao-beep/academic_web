[[items]]
title = "半轻子单举粲衰变"
subtitle = "解析结构、衰变宽度与电子能量矩"
date = "当前"
content = "我目前最主要的工作是研究半轻子单举粲衰变。我关心的是如何在足够可控的解析框架下得到衰变宽度和更高阶电子能量矩，并进一步为唯象分析提供可靠输入。\n\n这一方向同时涉及解析推导、数据处理以及与实验观测量的比较，其更大的目标是通过数据约束 HQET 中的非微扰参数。"
tags = ["粲衰变", "重味物理", "电子能量矩"]

[[items]]
title = "HQET、OPE 与非微扰参数"
subtitle = "重味唯象中的有效场论工具"
date = "当前"
content = "重夸克有效理论（HQET）和算符乘积展开（OPE）是我研究中的核心工具。我使用这些方法组织高维算符效应、构建受控近似，并研究非微扰参数如何通过数据得到约束。\n\n我特别关注的是：形式化结果如何真正变成可用于唯象的表达式，尤其是在单举粲衰变的数据驱动研究中。"
tags = ["HQET", "OPE", "非微扰物理"]

[[items]]
title = "beauty-charmed 重子与弱湮灭衰变"
subtitle = "寿命结构与重重子衰变道研究"
date = "前期工作与延续基础"
content = "我的第二条研究线来自本科毕业论文，主要关注 beauty-charmed 重子的弱湮灭衰变及寿命问题。通过 HDET 和 OPE，我研究了相关衰变道以及混合角与衰变宽度之间的关系，尤其是 \\(\\Xi_{bc} \\to X_{cs}\\) 通道。\n\n这部分工作构成了我理解有效场论如何应用到具体衰变过程中的重要基础。"
tags = ["beauty-charmed 重子", "弱湮灭", "HDET"]
